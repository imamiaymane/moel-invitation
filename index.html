<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MOEL Einladung bestätigen</title>

<link rel="icon" type="image/png" href="logo.png">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1 id="title">Teilnahme bestätigen</h1>

<p id="subtitle" class="subtitle">
Bitte bestätigen Sie Ihre Teilnahme zur Eröffnung von MOEL.
</p>

<form id="inviteForm">

<input id="name" type="text" placeholder="Name" required>

<input id="email" type="email" placeholder="E-Mail-Adresse" required>

<input id="phone" type="tel" placeholder="Telefonnummer (optional)">

<button type="submit">
Ich bestätige meine Teilnahme
</button>

</form>

<div id="successMessage" class="success-card">

<h2>Vielen Dank.</h2>

<p>
Ihre Teilnahme zur Eröffnung von <b>MOEL</b> wurde bestätigt.
</p>

<p>
Bitte prüfen Sie Ihre E-Mail.<br>
Dort finden Sie Ihre persönliche Einladung.
</p>

<p class="address">
21. März 2026<br>
Eckenheimer Landstraße 48<br>
60318 Frankfurt am Main
</p>

</div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
